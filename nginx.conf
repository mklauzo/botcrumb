server {
    listen 80;

    # Docker internal DNS — resolve upstreams at request time, not startup
    resolver 127.0.0.11 valid=10s;
    set $upstream_frontend http://frontend:3000;
    set $upstream_backend  http://backend:8000;

    # Pass real client IP from upstream proxy (Nginx Proxy Manager)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # WebSocket
    location /ws/ {
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Backend REST API
    location /api/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /health {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
    }

    # Frontend (Next.js) — including Next.js HMR websocket
    location / {
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
